<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What's for Dinner? | Menu Recommendation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="lang-switcher">
        <a href="index.html" class="lang-link">KO</a>
        <a href="en.html" class="lang-link active">EN</a>
    </nav>

    <main class="container">
        <header>
            <h1>🍲 What's for Dinner?</h1>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
        </header>
        
        <div id="display-area">
            <p style="color: var(--text-secondary); font-size: 1.1rem;">Solving your decision fatigue! <br>Click the button to get a dinner recommendation.</p>
        </div>

        <button id="recommend-btn">
            <span>✨ Get Recommendation</span>
        </button>
    </main>

    <section class="inquiry-section">
        <div class="inquiry-container">
            <h2>🤝 Partnership Inquiry</h2>
            <p>For menu requests or business inquiries, please leave a message below.</p>
            <form action="https://formspree.io/f/mlgpypkr" method="POST" id="inquiry-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="example@domain.com" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="4" placeholder="Detail your inquiry here" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
    </section>

    <section class="comment-section">
        <div class="comment-container">
            <h2>💬 Feedback</h2>
            <div id="disqus_thread"></div>
            <script>
                (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://productbuilder2-6.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </div>
    </section>

    <script src="main.js"></script>
</body>
</html>
