<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 뭐 먹지? | 저녁 메뉴 추천</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="style.css">
    <!-- Kakao SDK -->
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js" integrity="sha384-lLeYY97784z98489098489098489098489098489098489098489098489098489" crossorigin="anonymous"></script>
</head>
<body>

    <nav class="lang-switcher">
        <a href="index.html" class="lang-link active">KO</a>
        <a href="en.html" class="lang-link">EN</a>
    </nav>

    <main class="container">
        <header>
            <h1>🍲 오늘 뭐 먹지?</h1>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
        </header>
        
        <div id="display-area">
            <p style="color: var(--text-secondary); font-size: 1.1rem;">결정 장애 해결사! <br>버튼을 눌러 저녁 메뉴를 추천받으세요.</p>
        </div>

        <button id="recommend-btn">
            <span>✨ 저녁 메뉴 추천받기</span>
        </button>
    </main>

    <section class="share-section">
        <div class="share-container">
            <h2>📢 친구에게 공유하기</h2>
            <div class="share-buttons">
                <button id="share-kakao" class="share-btn kakao" title="카카오톡 공유">
                    <span class="share-icon">💬</span>
                    <span>카카오톡</span>
                </button>
                <button id="share-twitter" class="share-btn twitter" title="X(트위터) 공유">
                    <span class="share-icon">🐦</span>
                    <span>X (트위터)</span>
                </button>
                <button id="copy-link" class="share-btn link" title="링크 복사">
                    <span class="share-icon">🔗</span>
                    <span>링크 복사</span>
                </button>
            </div>
        </div>
    </section>

    <section class="inquiry-section">
        <div class="inquiry-container">
            <h2>🤝 맛집 제휴 문의</h2>
            <p>메뉴 추가 요청이나 비즈니스 문의는 아래 폼을 통해 남겨주세요.</p>
            <form action="https://formspree.io/f/mlgpypkr" method="POST" id="inquiry-form">
                <div class="form-group">
                    <label for="name">성함</label>
                    <input type="text" id="name" name="name" placeholder="이름을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" placeholder="example@domain.com" required>
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" rows="4" placeholder="문의하실 내용을 상세히 적어주세요" required></textarea>
                </div>
                <button type="submit" class="submit-btn">문의 보내기</button>
            </form>
        </div>
    </section>

    <section class="comment-section">
        <div class="comment-container">
            <h2>💬 메뉴 추천 한마디</h2>
            <div id="disqus_thread"></div>
            <script>
            (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://productbuilder2-6.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </div>
    </section>

    <script src="main.js"></script>
</body>
</html>
