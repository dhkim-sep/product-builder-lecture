<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="theme-toggle-container">
            <button id="theme-toggle">Dark Mode</button>
        </div>
        <h1>Lotto Number Generator</h1>
        <button id="generate">Generate Numbers</button>
        <div id="numbers" class="numbers-container"></div>

        <hr class="divider">

        <div class="contact-form-container">
            <h2>Partnership Inquiry</h2>
            <form action="https://formspree.io/f/mlgpypkr" method="POST" id="contact-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="How can we help you?" required></textarea>
                </div>
                <button type="submit" id="submit-btn">Send Message</button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
